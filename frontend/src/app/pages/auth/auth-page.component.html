<!-- auth.component.html -->
<div class="auth-container">

  <!-- Background decorative elements -->
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-grid"></div>

  <div class="card">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-icon">₹</div>
      <div class="brand-text">
        <h1>RajMudra</h1>
        <p class="subtitle">Secure token-based vouchers</p>
      </div>
    </div>

    <!-- Tab Switch -->
    <div class="tab-switch">
      <div class="tab-track">
        <div class="tab-indicator" [class.register]="mode === 'register'"></div>
        <button
          type="button"
          [class.active]="mode === 'login'"
          (click)="switchMode('login')"
        >Login</button>
        <button
          type="button"
          [class.active]="mode === 'register'"
          (click)="switchMode('register')"
        >Register</button>
      </div>
    </div>

    <!-- Form -->
    <form (ngSubmit)="submit()" #form="ngForm">

      <div class="form-group">
        <label for="email">Email</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/></svg>
          <input
            id="email"
            type="email"
            name="email"
            [(ngModel)]="email"
            required
            autocomplete="email"
            placeholder="you@example.com"
          />
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input
            id="password"
            type="password"
            name="password"
            [(ngModel)]="password"
            required
            minlength="6"
            autocomplete="current-password"
            placeholder="Min. 6 characters"
          />
        </div>
      </div>

      <ng-container *ngIf="mode === 'register'">
        <div class="form-group">
          <label for="role">Role</label>
          <div class="input-wrapper select-wrapper">
            <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <select id="role" name="role" [(ngModel)]="role">
              <option value="User">User</option>
              <option value="Merchant">Merchant</option>
              <option value="Admin">Admin</option>
            </select>
            <svg class="select-chevron" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
        </div>

        <div class="form-group" *ngIf="role === 'Merchant'">
          <label for="merchantCategory">
            Merchant Category
            <span class="label-hint">e.g. Food, Education</span>
          </label>
          <div class="input-wrapper">
            <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
            <input
              id="merchantCategory"
              type="text"
              name="merchantCategory"
              [(ngModel)]="merchantCategory"
              placeholder="Your business category"
            />
          </div>
        </div>
      </ng-container>

      <!-- Error -->
      <div class="error-box" *ngIf="error()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        {{ error() }}
      </div>

      <!-- Submit -->
      <button type="submit" class="submit-btn" [disabled]="form.invalid || loading()">
        <span class="btn-content" *ngIf="!loading()">
          {{ mode === 'login' ? 'Sign In' : 'Create Account' }}
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </span>
        <span class="btn-loader" *ngIf="loading()">
          <span></span><span></span><span></span>
        </span>
      </button>

    </form>

  </div>
</div>
